name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Install dependencies
        run: pixi install

      - name: Verify imports
        run: pixi run test-imports

      # PyTorch from conda-forge segfaults on macOS ARM CI runners.
      # Run full suite on Linux/Windows, skip PyTorch/TF tests on macOS.
      - name: Run tests (full)
        if: runner.os != 'macOS'
        run: pixi run test

      - name: Run tests (skip PyTorch/TF on macOS)
        if: runner.os == 'macOS'
        run: pixi run pytest tests/ -v --ignore=tests/test_diffusion

  cuda-resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Verify CUDA environment resolves
        run: pixi install -e cuda
